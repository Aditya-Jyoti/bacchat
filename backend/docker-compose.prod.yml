services:

  postgres:
    image: postgres:16-alpine
    container_name: bacchat-postgres
    restart: unless-stopped
    env_file: .env.production.local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bacchat -d bacchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bacchat-backend
    restart: unless-stopped
    env_file: .env.production.local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bacchat.rule=Host(`bacchat.omrin.in`)"
      - "traefik.http.services.bacchat.loadbalancer.server.port=3000"

volumes:
  postgres_data:
