name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------- backend
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest

    # Postgres for the Jest+supertest integration suite. Matches the dev
    # docker-compose.yml roughly (the tests run prisma migrate against it).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bacchat
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: bacchat_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bacchat:ci_password@localhost:5432/bacchat_ci
      JWT_SECRET: ci-jwt-secret-needs-to-be-at-least-32-characters-long
      NODE_ENV: test
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        working-directory: backend
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy

      - name: Type-check
        working-directory: backend
        run: pnpm exec tsc --noEmit

      - name: Tests
        working-directory: backend
        run: pnpm test

  # -------------------------------------------------------------- frontend
  frontend:
    name: Frontend (analyze + dry build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            frontend/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('frontend/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Dart deps
        working-directory: frontend
        run: flutter pub get

      - name: Code generation
        working-directory: frontend
        run: dart run build_runner build

      - name: Static analysis
        working-directory: frontend
        run: flutter analyze

      # Catch build-time regressions early — same target the release workflow uses.
      - name: Dry build (debug, no signing)
        working-directory: frontend
        run: flutter build apk --debug --target-platform android-arm64
