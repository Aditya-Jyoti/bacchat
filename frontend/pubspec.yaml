name: frontend
description: "An opensource split tracking application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  google_fonts: ^8.0.1
  package_info_plus: ^10.1.0

  # State management
  flutter_riverpod: ^3.1.0

  # Local database (offline cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.0.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^17.2.3

  # OCR
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2

  # Networking
  dio: ^5.8.0

  # Utilities
  shared_preferences: ^2.3.0
  intl: ^0.20.2
  share_plus: ^13.1.0
  flutter_animate: ^4.5.0

  # SMS reading (Android only — auto-log bank transactions)
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^11.4.0
  flutter_secure_storage: ^10.2.0
  another_telephony: ^0.4.1
  crypto: ^3.0.7
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation (for Drift)
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^4.0.0+1
  riverpod_annotation: ^4.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true
