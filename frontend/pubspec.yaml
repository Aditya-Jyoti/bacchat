name: frontend
description: "An opensource split tracking application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dynamic_color: ^1.8.1
  google_fonts: ^8.0.1
  package_info_plus: ^10.1.0

  # State management
  flutter_riverpod: ^3.1.0

  # Local database (offline cache)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.0.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^17.2.3

  # OCR
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.1.2

  # Networking
  dio: ^5.8.0

  # Utilities
  shared_preferences: ^2.3.0
  intl: ^0.20.2
  share_plus: ^13.1.0
  flutter_animate: ^4.5.0

  # SMS reading (Android only — auto-log bank transactions)
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^11.4.0
  flutter_secure_storage: ^10.2.0
  another_telephony: ^0.4.1
  crypto: ^3.0.7
  qr_flutter: ^4.1.0
  uuid: ^4.5.3
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation (for Drift)
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^4.0.0+1
  riverpod_annotation: ^4.0.0
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true            # generates legacy + adaptive-icon resources
  ios: true                # iOS icons (single image, no transparency)
  image_path: "assets/icon/app_icon.png"
  # Adaptive icon (Android 8+): a flat-colour background layer plus the
  # transparent foreground with the safe-zone-scaled content.
  adaptive_icon_background: "#1E88E5"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  # Modernise the legacy mipmap icon too so launchers that ignore adaptive
  # still get the new artwork (we overwrite ic_launcher.png at every density).
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
